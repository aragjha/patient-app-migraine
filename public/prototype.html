          {[
            { k: 'acute',      t: 'Acute relief',        s: 'Triptans, NSAIDs, gepants', c: '#FF6B5C', bg: '#FFE8E4' },
            { k: 'preventive', t: 'Preventive daily',    s: 'Beta-blockers, anti-seizure', c: '#3B82F6', bg: '#EFF6FF' },
            { k: 'supplement', t: 'Supplements',         s: 'Magnesium, B2, CoQ10',       c: '#16A34A', bg: '#DCFCE7' },
          ].map(cat => {
            const count = meds.filter(m => m.kind === cat.k).length;
            return (
              <button key={cat.k} onClick={() => setPicker(cat.k)} style={{

                <div style={{

                  display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                }}><Icon name="pill" size={26} stroke={2}/></div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 15.5, fontWeight: 700, color: 'var(--ink)' }}>{cat.t}</div>
                  <div style={{ fontSize: 12.5, color: 'var(--muted)', marginTop: 2 }}>{cat.s}</div>
                </div>
                {count > 0 && (
                  <div style={{
                    padding: '4px 10px', borderRadius: 10, background: cat.bg, color: cat.c,
                    fontSize: 12, fontWeight: 800,

            <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--muted-2)', letterSpacing: '0.12em', marginBottom: 10 }}>

              {meds.map(m => (
                <div key={m.id} style={{
                  padding: '12px 14px', borderRadius: 14, background: 'var(--card)',
                  border: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 12,
                }}>
                  <div style={{
                    width: 34, height: 34, borderRadius: 10, background: m.color + '22', color: m.color,
                    display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                  }}><Icon name="pill" size={18} stroke={2}/></div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--ink)' }}>{m.name}</div>
                    <div style={{ fontSize: 12, color: 'var(--muted)' }}>{m.dose} · {m.kind}</div>
                  </div>
                  <button onClick={() => removeMed(m.id)} style={{
                    background: 'transparent', border: 0, cursor: 'pointer', color: 'var(--muted)',
                    padding: 6,
                  }}><Icon name="x" size={16} stroke={2.2}/></button>

      </div>
      <div style={{ padding: '12px 24px 28px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        <PrimaryBtn onClick={() => {
          ctx.completeFlow({ meds });
          ctx.setFlow('main');
          ctx.showToast(meds.length ? `Welcome — ${meds.length} meds added` : 'Welcome to NeuroCare');
        }}>
          {meds.length ? `Continue with ${meds.length} med${meds.length > 1 ? 's' : ''}` : 'Done'}
        </PrimaryBtn>
        {meds.length === 0 && (
          <button onClick={() => { ctx.completeFlow({ meds: [] }); ctx.setFlow('main'); }} style={{
            height: 44, background: 'transparent', border: 0, cursor: 'pointer',
            color: 'var(--muted)', fontFamily: 'inherit', fontSize: 14, fontWeight: 600,
          }}>Skip — I'll add later</button>
        )}

    </FlowShell>
  );
}

const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ─────────────────────────────────────────────────────────────
// Persisted-state hook
// ─────────────────────────────────────────────────────────────
function usePersisted(key, initial) {
  const [v, setV] = useState(() => {
    try {
      const raw = localStorage.getItem('nc2:' + key);
      return raw ? JSON.parse(raw) : initial;
    } catch { return initial; }
  });
  useEffect(() => {
    try { localStorage.setItem('nc2:' + key, JSON.stringify(v)); } catch {}
  }, [key, v]);
  return [v, setV];
}

// ─────────────────────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────────────────────
function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div style={{
      position: 'absolute', left: '50%', bottom: 110,
      transform: 'translateX(-50%)',
      background: '#1B2A4E', color: '#fff',
      padding: '12px 18px', borderRadius: 999,
      fontSize: 13, fontWeight: 600,
      boxShadow: '0 8px 24px rgba(0,0,0,0.2)',
      animation: 'fadeUp .3s ease-out',
      zIndex: 200,
      whiteSpace: 'nowrap',
    }}>
      <span style={{ color: '#60A5FA', marginRight: 8 }}>✦</span>{msg}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Bottom navigation
// ─────────────────────────────────────────────────────────────
function BottomNav({ active, onTab, onLog, theme }) {
  const items = [
    { id: 'home', label: 'Home', icon: 'home' },
    { id: 'diary', label: 'Diary', icon: 'diary' },
    { id: 'log', label: '', icon: 'plus', hero: true },
    { id: 'neura', label: 'Neura', icon: 'sparkle' },
    { id: 'profile', label: 'Profile', icon: 'user' },
  ];
  const navBg = theme === 'dark' ? 'rgba(14,18,32,0.88)' : 'rgba(255,255,255,0.92)';
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      background: navBg,
      backdropFilter: 'blur(16px) saturate(180%)',
      WebkitBackdropFilter: 'blur(16px) saturate(180%)',
      borderTop: '1px solid var(--border-2)',
      paddingBottom: 'calc(34px + env(safe-area-inset-bottom))',
      display: 'flex', alignItems: 'center', justifyContent: 'space-around',
      height: 92, zIndex: 50,
    }}>
      {items.map(it => {
        if (it.hero) {
          return (
            <button key={it.id} onClick={onLog}
              style={{
                width: 56, height: 56, borderRadius: 20,
                background: 'linear-gradient(135deg, #1B2A4E 0%, #3B82F6 100%)',
                border: 0, cursor: 'pointer', color: '#fff',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: '0 8px 20px rgba(59,130,246,0.35)',
                transform: 'translateY(-10px)',
              }}>
              <Icon name="plus" size={26} stroke={2.5}/>
            </button>
          );
        }
        const on = active === it.id;
        return (
          <button key={it.id} onClick={() => onTab(it.id)}
            style={{
              background: 'transparent', border: 0, cursor: 'pointer',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              color: on ? 'var(--ink)' : 'var(--muted-2)',
              fontFamily: 'inherit', padding: '6px 4px',
            }}>
            <Icon name={it.icon} size={22} stroke={on ? 2.2 : 1.8}/>
            <span style={{ fontSize: 10, fontWeight: on ? 700 : 500 }}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Scale-to-fit stage
// ─────────────────────────────────────────────────────────────
function Stage({ children, width = 402, height = 874 }) {
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const fit = () => {
      const w = window.innerWidth, h = window.innerHeight;
      const pad = 80;
      const s = Math.min((w - pad) / width, (h - pad) / height, 1.1);
      setScale(s);
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, [width, height]);
  return (
    <div style={{
      width, height, transform: `scale(${scale})`, transformOrigin: 'center',
      position: 'relative',
    }}>{children}</div>
  );
}

// ─────────────────────────────────────────────────────────────
// App root
// ─────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = usePersisted('tab', 'home');
  const [stack, setStack] = usePersisted('stack', []); // modal/screen stack
  const [flow, setFlow] = usePersisted('flow', 'splash'); // launch flow: splash|auth-*|consent|onb-*|med-onb-*|main
  const [profile, setProfile] = usePersisted('profile', {}); // collected onboarding data
  const [streak, setStreak] = usePersisted('streak', 12);
  const [points, setPoints] = usePersisted('points', 480);
  const [freezes, setFreezes] = usePersisted('freezes', 2);
  const [logs, setLogs] = usePersisted('logs', []);
  const [theme, setTheme] = usePersisted('theme', 'light');
  const [lastReward, setLastReward] = useState(null);
  const [pendingScript, setPendingScript] = useState(null);
  const [pendingQuery, setPendingQuery] = useState(null);
  const [toast, setToastMsg] = useState(null);
  const [dim, setDim] = useState(false);
  const [variant, setVariant] = useState(() => window.__tweaks?.neuragptVariant || 'rich');

  // Apply theme as data-theme attribute
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  useEffect(() => {
    const h = (e) => {
      const t = e.detail || {};
      if (t.neuragptVariant) setVariant(t.neuragptVariant);
      setDim(t.theme === 'dim');
    };
    window.addEventListener('tweaks-changed', h);
    return () => window.removeEventListener('tweaks-changed', h);
  }, []);

  const push = (s) => setStack(prev => [...prev, s]);
  const pop = () => setStack(prev => prev.slice(0, -1));
  const reset = () => setStack([]);

  const showToast = (m) => {
    setToastMsg(m);
    setTimeout(() => setToastMsg(null), 2400);
  };

  // Open Neura with an optional pre-loaded script, or a free-text query
  const openNeura = (scriptId = null, query = null) => {
    reset();
    setTab('neura');
    if (scriptId) setPendingScript(scriptId);
    if (query) setPendingQuery(query);
  };
  const clearPendingScript = () => setPendingScript(null);
  const clearPendingQuery = () => setPendingQuery(null);

  const onScriptComplete = (scriptId, answers) => {
    const entry = { id: Date.now(), ts: new Date().toISOString(), scriptId, answers };
    setLogs(prev => [entry, ...prev]);
    if (scriptId === 'headache-log') {
      setPoints(p => p + 50);
      setLastReward({ pts: 50, kind: 'log', at: Date.now() });
      showToast('+50 pts · Headache logged');
    } else if (scriptId === 'daily-checkin') {
      setPoints(p => p + 30);
      setStreak(s => s + 1);
      setLastReward({ pts: 30, kind: 'streak', at: Date.now() });
      showToast(`+30 pts · Streak ${streak + 1} 🔥`);
    } else if (scriptId === 'trigger-diary') {
      setPoints(p => p + 20);
      setLastReward({ pts: 20, kind: 'diary', at: Date.now() });
      showToast('+20 pts · Diary updated');
    }
  };

  const onLogComplete = (entry) => {
    setLogs(prev => [{ ...entry, id: Date.now(), ts: new Date().toISOString() }, ...prev]);
    setPoints(p => p + 50);
    setStreak(s => s + (entry.checkin ? 1 : 0));
    reset();
    showToast(entry.checkin ? '+50 pts · Streak extended!' : '+50 pts · Headache logged');
  };

  const completeFlow = (data) => setProfile(p => ({ ...p, ...data }));
  const restartFlow = () => {
    setFlow('splash');
    reset();
    setTab('home');
  };

  const ctx = {
    push, pop, reset, showToast, onLogComplete,
    streak, points, freezes, logs, setTab, variant, dim,
    theme, setTheme, lastReward,
    openNeura, pendingScript, clearPendingScript,
    pendingQuery, clearPendingQuery, onScriptComplete,
    flow, setFlow, profile, completeFlow, restartFlow,
  };
  const current = stack[stack.length - 1];

  // Launch-flow routing
  const isSplash = flow === 'splash';
  const isAuth = flow && flow.startsWith('auth-');
  const isConsent = flow === 'consent';
  const isMigraineOnb = flow && flow.startsWith('onb-');
  const isMedOnb = flow && flow.startsWith('med-onb-');
  const inFlow = isSplash || isAuth || isConsent || isMigraineOnb || isMedOnb;
  // Dark status bar over splash
  const darkFrame = theme === 'dark' || isSplash;

  return (
    <IOSDevice width={402} height={874} dark={darkFrame} title={undefined}>
      <div className="app" data-theme={theme} style={{ background: 'var(--bg)', color: 'var(--ink)', height: '100%', position: 'relative' }}>
        {inFlow ? (
          <>
            {isSplash && <SplashScreen ctx={ctx}/>}
            {isAuth && <AuthScreen ctx={ctx} mode={flow.replace('auth-','')}/>}
            {isConsent && <ConsentScreen ctx={ctx}/>}
            {isMigraineOnb && <MigraineOnboarding ctx={ctx}/>}
            {isMedOnb && <MedOnboarding ctx={ctx}/>}
            <Toast msg={toast}/>
          </>
        ) : (
          <>
            {/* Tab content */}
            <div className="scroll" style={{ flex: 1, paddingTop: 54, paddingBottom: 100 }}>
              {tab === 'home' && <HomeScreen ctx={ctx}/>}
              {tab === 'diary' && <DiaryScreen ctx={ctx}/>}
              {tab === 'neura' && <NeuraScreen ctx={ctx}/>}
              {tab === 'profile' && <ProfileScreen ctx={ctx}/>}
            </div>

            {/* Bottom nav — center + opens Neura with headache-log script */}
            <BottomNav active={tab} theme={theme} onTab={(t) => { setTab(t); reset(); }} onLog={() => openNeura('headache-log')}/>

            {/* Modal stack — kept for relief/meds/rewards; log + checkin now in Neura */}
            {current?.type === 'relief' && <ReliefModal ctx={ctx}/>}
            {current?.type === 'meds' && <MedsModal ctx={ctx}/>}
            {current?.type === 'rewards' && <RewardsModal ctx={ctx}/>}

            <Toast msg={toast}/>
          </>
        )}
      </div>
    </IOSDevice>
  );
}

// Wait for all deps to be defined before rendering
function boot() {
  const need = ['IOSDevice','Icon','HomeScreen','DiaryScreen','NeuraScreen','ProfileScreen',
                'ReliefModal','MedsModal','RewardsModal',
                'SplashScreen','AuthScreen','ConsentScreen','MigraineOnboarding','MedOnboarding'];
  if (need.some(n => !window[n])) { setTimeout(boot, 40); return; }
  const root = ReactDOM.createRoot(document.getElementById('stage'));
  root.render(<Stage><App/></Stage>);
}
boot();


</script>

<!-- Tweaks wiring -->
<script>
(() => {
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "neuragptVariant": "rich",
    "theme": "light"
  }/*EDITMODE-END*/;
  window.__tweaks = TWEAKS;
  const panel = document.getElementById('tweaks');

  function apply() {
    window.dispatchEvent(new CustomEvent('tweaks-changed', { detail: TWEAKS }));
    document.querySelectorAll('#tw-variant button').forEach(b => {
      b.classList.toggle('active', b.dataset.v === TWEAKS.neuragptVariant);
    });
    document.querySelectorAll('#tw-theme button').forEach(b => {
      b.classList.toggle('active', b.dataset.t === TWEAKS.theme);
    });
  }

  document.querySelectorAll('#tw-variant button').forEach(b => {
    b.addEventListener('click', () => {
      TWEAKS.neuragptVariant = b.dataset.v;
      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{neuragptVariant:b.dataset.v}},'*');
      apply();
    });
  });
  document.querySelectorAll('#tw-theme button').forEach(b => {
    b.addEventListener('click', () => {
      TWEAKS.theme = b.dataset.t;
      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{theme:b.dataset.t}},'*');
      apply();
    });
  });

  window.addEventListener('message', (e) => {
    if (e.data?.type === '__activate_edit_mode') panel.classList.add('open');
    if (e.data?.type === '__deactivate_edit_mode') panel.classList.remove('open');
  });
  window.parent.postMessage({type:'__edit_mode_available'}, '*');
  apply();
})();
</script>
